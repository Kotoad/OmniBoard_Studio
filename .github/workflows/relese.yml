name: Build & Release

on:
  workflow_dispatch:
    inputs:
      # Optional: allow manual triggering with a specific version
      version:
        description: 'Release version tag (e.g., v0.12.0).'
        required: true
        type: string

jobs:
  # ─────────────────────────────────────────────
  # 1. Update version and commit it back to the repo
  # ─────────────────────────────────────────────
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version
        id: bump
        run: |
          echo "CURRENT_VERSION=${{ inputs.version }}" >> $GITHUB_ENV

      - name: Update files and clear passwords
        run: |
          VERSION=${{ inputs.version }}
          
          # Update Utils.py (targets single quotes around the key)
          sed -i "s/'CURRENT_VERSION': *\"[^\"]*\"/'CURRENT_VERSION': \"$VERSION\"/" Utils.py
          
          # Update Web_page/API/version.php (targets PHP array syntax)
          sed -i "s/\"tag_name\" *=> *\"[^\"]*\"/\"tag_name\" => \"$VERSION\"/" Web_page/API/version.php
          
          # Clear password in app_settings.json
          sed -i 's/"rpi_password": *"[^"]*"/"rpi_password": ""/' app_settings.json

          # Clear host in app_settings.json
          sed -i 's/"rpi_host": *"[^"]*"/"rpi_host": ""/' app_settings.json

      - name: Commit version bump and sanitized config
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt Utils.py Web_page/API/version.php app_settings.json
          git commit -m "chore: bump version to ${{ inputs.version }} and sanitize config [skip ci]"
          git push

  # ─────────────────────────────────────────────
  # 2. Build Windows — EXE + Inno Setup installer
  # ─────────────────────────────────────────────
  build-windows:
    needs: update-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        # Pull the version-bump commit
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 PyQt6-QScintilla paramiko cryptography pyserial mpremote pyinstaller telnetlib3 certifi
          # Add any other deps your app needs:
          # pip install -r requirements.txt

      - name: 🏗️ Run Build Script
        env:
            PYTHONIOENCODING: utf8
        run: |
            python build_exe.py

      - name: Zip the app folder
        run: |
          $version = Get-Content version.txt
          Compress-Archive `
            -Path "dist\OmniBoard Studio\*" `
            -DestinationPath "OmniBoard_Studio_Windows.zip"

      - name: Patch download URL in ISS
        # Point the installer at your server instead of GitHub
        run: |
          $version = Get-Content version.txt
          (Get-Content OmniBoard_Studio_Installer.iss) `
            -replace 'https://github\.com/[^'']+/OmniBoard_Studio_Windows\.zip', `
                     "https://omniboardstudio.cz/downloads/OmniBoard_Studio_Windows.zip" `
            | Set-Content OmniBoard_Studio_Installer.iss

      - name: Compile Inno Setup installer
        run: |
          choco install innosetup --no-progress -y
          iscc OmniBoard_Studio_Installer.iss
          # Output: OmniBoard_Online_Installer.exe (as set in OutputBaseFilename)

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            OmniBoard_Studio_Windows.zip
            OmniBoard_Online_Installer.exe

  # ─────────────────────────────────────────────
  # 3. Build Linux — tar.gz bundle
  # ─────────────────────────────────────────────
  build-linux:
    needs: update-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps (Qt needs these on headless runners)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libglib2.0-0 libgl1 libxkbcommon-x11-0 \
            libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0

      - name: Install Python dependencies
        run: pip install PyQt6 PyQt6-QScintilla paramiko cryptography pyserial mpremote pyinstaller telnetlib3 certifi
        # pip install -r requirements.txt

      - name: 🏗️ Run Build Script
        env:
            PYTHONIOENCODING: utf8
        run: |
            python build_exe.py

      - name: Package as tar.gz
        run: |
          VERSION=$(cat version.txt)
          tar -czf OmniBoard_Studio_Linux.tar.gz \
            -C "dist" "OmniBoard Studio"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: OmniBoard_Studio_Linux.tar.gz

  # ─────────────────────────────────────────────
  # 4. Upload everything to FTP + update version.php
  # ─────────────────────────────────────────────
  deploy:
    needs: [update-version, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Stage files for FTP upload
        run: |
          mkdir -p ftp_downloads
          cp artifacts/windows-build/OmniBoard_Studio_Windows.zip   ftp_downloads/
          cp artifacts/windows-build/OmniBoard_Online_Installer.exe ftp_downloads/
          cp artifacts/linux-build/OmniBoard_Studio_Linux.tar.gz    ftp_downloads/
          cp install.sh                                             ftp_downloads/ || true

      - name: Install lftp
        run: sudo apt-get update -q && sudo apt-get install -y lftp

      - name: Upload binaries via lftp (FTPS)
        run: |
          lftp -c "
          set ftp:ssl-force true;
          set ftp:ssl-protect-data true;
          set ssl:verify-certificate no;
          open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }};
          mirror -R ftp_downloads/ /downloads/;
          "

      - name: Upload API files via lftp (FTPS)
        run: |
          lftp -c "
          set ftp:ssl-force true;
          set ftp:ssl-protect-data true;
          set ssl:verify-certificate no;
          open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }};
          mkdir -p /API;
          cd /API;
          put Web_page/API/version.php;
          "