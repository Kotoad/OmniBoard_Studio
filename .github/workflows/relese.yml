name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g., v0.12.0).'
        required: true
        type: string
      notes:
        description: 'Release notes (displays on the download page).'
        required: false
        default: 'Latest stable release.'
        type: string

jobs:
  # ─────────────────────────────────────────────
  # 1. Update version, JSON manifest, and commit
  # ─────────────────────────────────────────────
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update files, JSON manifest, and clear passwords
        run: |
          VERSION="${{ inputs.version }}"
          NOTES="${{ inputs.notes }}"
          DATE=$(date +'%Y-%m-%d')
          
          # Update Utils.py
          sed -i "s/'CURRENT_VERSION': *\"[^\"]*\"/'CURRENT_VERSION': \"$VERSION\"/" Utils.py
          
          # Update Web_page/API/version.php
          sed -i "s/\"tag_name\" *=> *\"[^\"]*\"/\"tag_name\" => \"$VERSION\"/" Web_page/API/version.php
          
          # Clear passwords in app_settings.json
          sed -i 's/"rpi_password": *"[^"]*"/"rpi_password": ""/' app_settings.json
          sed -i 's/"rpi_host": *"[^"]*"/"rpi_host": ""/' app_settings.json
          sed -i 's/"rpi_user": *"[^"]*"/"rpi_user": ""/' app_settings.json

      - name: Commit version bump and sanitized config
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt Utils.py Web_page/API/version.php
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump version to ${{ inputs.version }} and sanitize config [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi

  # ─────────────────────────────────────────────
  # 2. Build Windows — EXE + Inno Setup installer
  # ─────────────────────────────────────────────
  build-windows:
    needs: update-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 PyQt6-QScintilla paramiko cryptography pyserial mpremote pyinstaller telnetlib3 certifi

      - name: 🏗️ Run Build Script
        env:
            PYTHONIOENCODING: utf8
        run: |
            python build_exe.py

      - name: Zip the app folder
        run: |
          Compress-Archive `
            -Path "dist\OmniBoard Studio\*" `
            -DestinationPath "OmniBoard_Studio_Windows.zip"

      - name: Patch download ISS
        run: |
          # Setup specific version installer
          (Get-content OmniBoard_Studio_Installer.iss) `
            -replace 'download_url\',\s*\'[^\']*\'', 'https://omniboardstudio.cz/downloads/${{ inputs.version }}/OmniBoard_Studio_Windows.zip' `
            -replace 'OutputBaseFilename=OmniBoard_Online_Installer', 'OutputBaseFilename="OmniBoard_Online_Installer_${{ inputs.version }}"' `
            | Set-Content OmniBoard_Studio_Installer.iss

          # Setup latest version installer
          (Get-content OmniBoard_Studio_Installer.iss) `
            -replace 'download_url\',\s*\'[^\']*\'', 'https://omniboardstudio.cz/downloads/latest/OmniBoard_Studio_Windows.zip' `
            -replace 'OutputBaseFilename=OmniBoard_Online_Installer', 'OutputBaseFilename="OmniBoard_Online_Installer_latest"' `
            | Set-Content OmniBoard_Studio_Installer.iss

      - name: Compile Inno Setup installers
        run: |
          choco install innosetup --no-progress -y
          iscc OmniBoard_Studio_Installer.iss
          iscc OmniBoard_Studio_Installer_latest.iss

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            OmniBoard_Studio_Windows.zip
            OmniBoard_Online_Installer_${{ inputs.version }}.exe
            OmniBoard_Online_Installer_latest.exe

  # ─────────────────────────────────────────────
  # 3. Build Linux — tar.gz bundle
  # ─────────────────────────────────────────────
  build-linux:
    needs: update-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libglib2.0-0 libgl1 libxkbcommon-x11-0 \
            libdbus-1-3 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0

      - name: Install Python dependencies
        run: pip install PyQt6 PyQt6-QScintilla paramiko cryptography pyserial mpremote pyinstaller telnetlib3 certifi

      - name: 🏗️ Run Build Script
        env:
            PYTHONIOENCODING: utf8
        run: |
            python build_exe.py

      - name: Package as tar.gz
        run: |
          tar -czf OmniBoard_Studio_Linux.tar.gz \
            -C "dist" "OmniBoard Studio"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: OmniBoard_Studio_Linux.tar.gz

  # ─────────────────────────────────────────────
  # 4. Upload everything to FTP
  # ─────────────────────────────────────────────
  deploy:
    needs: [update-version, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Create .env file
        run: |
          echo "POSTHOG_PERSONAL_API_KEY=${{ secrets.POSTHOG_PERSONAL_API_KEY }}" >> .env
          echo "POSTHOG_PROJECT_ID=${{ secrets.POSTHOG_PROJECT_ID }}" >> .env
          echo "POSTHOG_PROJECT_KEY=${{ secrets.POSTHOG_PROJECT_KEY }}" >> .env
          echo "TOKEN_GITHUB=${{ secrets.TOKEN_GITHUB }}" >> .env
          echo "CLIENT_ID_GITHUB=${{ secrets.CLIENT_ID_GITHUB }}" >> .env
          echo "CLIENT_SECRET_GITHUB=${{ secrets.CLIENT_SECRET_GITHUB }}" >> .env
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
          echo "ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}" >> .env
          echo 'ADMIN_PASSWORD_HASH=${{ secrets.ADMIN_PASSWORD_HASH }}' >> .env
          echo 'IP_HASH_SALT=${{ secrets.IP_HASH_SALT }}' >> .env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASS=${{ secrets.DB_PASS }}" >> .env
          echo "ACTION_API_TOKEN=${{ secrets.ACTION_API_TOKEN }}" >> .env

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Stage files for FTP upload
        run: |
          mkdir -p ftp_downloads/specific
          mkdir -p ftp_downloads/latest

          # Specific version folder
          cp artifacts/windows-build/OmniBoard_Studio_Windows.zip   ftp_downloads/specific/
          cp artifacts/windows-build/OmniBoard_Online_Installer_${{ inputs.version }}.exe ftp_downloads/specific/
          cp artifacts/linux-build/OmniBoard_Studio_Linux.tar.gz    ftp_downloads/specific/
          cp install.sh                                             ftp_downloads/specific/ || true

          # Latest version folder
          cp artifacts/windows-build/OmniBoard_Studio_Windows.zip   ftp_downloads/latest/
          cp artifacts/windows-build/OmniBoard_Online_Installer_latest.exe ftp_downloads/latest/
          cp artifacts/linux-build/OmniBoard_Studio_Linux.tar.gz    ftp_downloads/latest/
          cp install.sh                                             ftp_downloads/latest/ || true

      - name: Install lftp
        run: sudo apt-get update -q && sudo apt-get install -y lftp

      - name: Upload binaries via lftp (FTPS)
        run: |
          lftp -c "
          set ftp:ssl-force true;
          set ftp:ssl-protect-data true;
          set ssl:verify-certificate no;
          open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }};

          mkdir -p /downloads/${{ inputs.version }};
          mirror -R ftp_downloads/specific/ /downloads/${{ inputs.version }}/;

          mkdir -p /downloads/latest;
          mirror -R ftp_downloads/latest/ /downloads/latest/;
          "

      - name: Upload API files via lftp (FTPS)
        run: |
          lftp -c "
          set ftp:ssl-force true;
          set ftp:ssl-protect-data true;
          set ssl:verify-certificate no;
          open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }};
          mkdir -p /API;
          cd /API;
          put Web_page/API/version.php;
          put Web_page/API/track.php;
          "

      - name: Upload Admin, Auth & Data files via lftp (FTPS)
        run: |
          lftp -c "
          set ftp:ssl-force true;
          set ftp:ssl-protect-data true;
          set ssl:verify-certificate no;
          open -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }};
          put .env -o /Admin/.env;
          "
      - name: Log Release to MySQL Database
        run: |
          VERSION="${{ inputs.version }}"
          NOTES="${{ inputs.notes }}"
          DATE=$(date +'%Y-%m-%d')
          W_FILE="/downloads/$VERSION/OmniBoard_Online_Installer_$VERSION.exe"
          L_FILE="/downloads/$VERSION/OmniBoard_Studio_Linux.tar.gz"

          # 1. Safely generate the JSON payload using jq
          JSON_PAYLOAD=$(jq -n \
            --arg v "$VERSION" \
            --arg d "$DATE" \
            --arg wf "$W_FILE" \
            --arg lf "$L_FILE" \
            --arg n "$NOTES" \
            '{version: $v, date: $d, windows_file: $wf, linux_file: $lf, notes: $n}')

          # 2. Send the safely encoded payload
          curl -f -X POST https://omniboardstudio.cz/API/add_release \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.ACTION_API_TOKEN }}" \
            -d "$JSON_PAYLOAD"