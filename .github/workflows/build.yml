name: Debug App Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g., v0.12)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        ref: Test

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 PyQt6-QScintilla paramiko cryptography pyserial mpremote pyinstaller telnetlib3 certifi

    - name: 🐧 Install Linux System Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libxcb-cursor0 libgl1 libxkbcommon-x11-0

    - name: 📝 Inject Version into Utils.py
      shell: bash
      run: sed -i -E 's/('\''CURRENT_VERSION'\''[ \t]*:[ \t]*)"[^"]*"/\1"${{ inputs.version }}"/' Utils.py

    - name: 🏗️ Run Build Script
      env:
        PYTHONIOENCODING: utf8
      run: |
        python build_exe.py

    - name: 🗜️ Strip Debug Symbols (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        find dist/ -name "OmniBoard Studio" -type f -executable -exec strip --strip-unneeded {} +

    - name: 📦 Package Linux Build (tar.gz)
      if: matrix.os == 'ubuntu-latest'
      run: |
        cd "dist/OmniBoard Studio"
        tar -czf ../../OmniBoard_Studio_Linux.tar.gz *

    - name: 📦 Package Windows Build (zip)
      if: matrix.os == 'windows-latest'
      working-directory: dist/OmniBoard Studio
      run: |
        7z a -tzip "..\..\OmniBoard_Studio_Windows.zip" *
    
    - name: 📝 Inject Version into Installer Script
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        sed -i 's/^AppVersion=.*/AppVersion=${{ inputs.version }}/' OmniBoard_Studio_Installer.iss

    - name: 🛠️ Compile Windows Installer (Inno Setup)
      if: matrix.os == 'windows-latest'
      run: |
        choco install innosetup
        iscc OmniBoard_Studio_Installer.iss
      
    - name: 📤 Upload Executable (Linux)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: OmniBoard-Linux
        path: OmniBoard_Studio_Linux.tar.gz

    - name: 📤 Upload Executable (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: OmniBoard-Windows
        path: OmniBoard_Studio_Windows.zip  
